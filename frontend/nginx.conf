server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Inject backend API URL via _config.js before serving index.html
    location = /index.html {
        sub_filter '<script>' '<script>window.__TRAMS_API__="__BACKEND_URL__/api";</script><script>';
        sub_filter_once on;
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api to backend (used if same-origin deployment)
    location /api/ {
        proxy_pass __BACKEND_URL_SLASH__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;
}
